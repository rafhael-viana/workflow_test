name: docker_deploy

run-name: Docker build and deploy on server using actions.

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  TAG: latest

on:
  push:
    branches:
      - main

jobs:
  docker_deploy:
    runs-on: ubuntu-latest
    environment: Deploy
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Docker meta ( lowercase + tags )
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw, value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Debug secrets
        run: |
          echo "HOST is set: ${{ secrets.SSH_HOST != '' }}"
          echo "USER is set: ${{ secrets.SSH_USER != '' }}"
          echo "KEY is set: ${{ secrets.SSH_KEY != '' }}"

      - name: Deploy via SSH (docker compose pull + up)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.APP_DIR }}"
            docker compose pull
            docker compose up -d
            docker image prune -f
